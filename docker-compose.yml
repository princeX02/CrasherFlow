services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: crusher
      POSTGRES_PASSWORD: crusherpass
      POSTGRES_DB: crusherflow
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crusher -d crusherflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_TYPE: pg
      DATABASE_URL: postgres://crusher:crusherpass@db:5432/crusherflow
    ports:
      - "3000:3000"

volumes:
  db-data:
    name: crusherflow_db_data
