version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: crusher
      POSTGRES_PASSWORD: crusherpass
      POSTGRES_DB: crusherflow
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
    name: crusherflow_db_data
