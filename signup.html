<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign Up - CrusherFlow</title>
  <style>body{font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial;margin:0;padding:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#f6f8fa} .card{background:#fff;padding:28px;border-radius:8px;box-shadow:0 6px 18px rgba(15,23,42,0.08);width:360px} input{width:100%;padding:10px;margin-top:8px;border:1px solid #dfe3e8;border-radius:6px} button{width:100%;padding:10px;margin-top:16px;border-radius:6px;border:0;background:#2563eb;color:#fff;font-weight:600} .muted{color:#6b7280;font-size:13px}</style>
</head>
<body>
  <div class="card">
    <h2>Create an account</h2>
    <p class="muted">Sign up to manage vehicles and trips securely.</p>
    <form id="signup">
      <label>Username</label>
      <input id="username" name="username" type="text" required minlength="3" />
      <label style="margin-top:8px">Password</label>
      <input id="password" name="password" type="password" required minlength="8" />
      <div style="margin-top:8px;font-size:13px;color:#6b7280">Password must be at least 8 characters.</div>
      <button type="submit">Create account</button>
      <div id="msg" style="margin-top:12px"></div>
    </form>
    <p style="margin-top:12px">Already have an account? <a href="/login.html">Log in</a></p>
  </div>

<script>
const form = document.getElementById('signup');
const msg = document.getElementById('msg');
form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  msg.textContent = '';
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if(username.length < 3 || password.length < 8){ msg.textContent = 'Please meet the minimum requirements.'; return; }
  try{
    const res = await fetch('/api/auth/signup', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username,password}), credentials: 'include'
    });
    const j = await res.json();
    if(!res.ok) { msg.textContent = j.error || 'Signup failed'; return; }
    msg.style.color = 'green'; msg.textContent = 'Account created. Redirecting...';
    setTimeout(()=> location.href='/', 900);
  }catch(err){ msg.textContent = err.message; }
});
</script>
</body>
</html>
